<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>milk</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft Yahei", sans-serif;
            background-color: #f8f2f6;
            overflow: hidden;
            font-size: 14px;
            transition: all 0.4s ease;
        }

        :root {
            --main: #ff9bb3;
            --sub: #ffd6e0;
            --text: #444;
            --bg: #fff5f8;
            --card: #ffffffcc;
            --border: #ffc8d8;
            --btn: #ffb8cc;
            --hover: #ff8da1;
        }

        /* 全局背景层 */
        .bg-blur {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
        }

        /* 主容器 */
        .main-wrap {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航 */
        .top-nav {
            height: 56px;
            background: var(--card);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 1px solid var(--border);
        }

        .nav-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--main);
        }

        .nav-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 15px;
            background: var(--btn);
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            margin-left: 4px;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background: var(--hover);
        }

        /* 聊天容器 */
        .chat-container {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
        }

        .chat-container::-webkit-scrollbar {
            width: 5px;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--main);
            border-radius: 3px;
        }

        /* 消息气泡 */
        .msg-row {
            display: flex;
            margin: 10px 0;
            align-items: flex-end;
        }

        .msg-left {
            justify-content: flex-start;
        }

        .msg-right {
            justify-content: flex-end;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border);
        }

        .avt-left {
            margin-right: 8px;
        }

        .avt-right {
            margin-left: 8px;
        }

        .bubble {
            max-width: 72%;
            padding: 10px 14px;
            line-height: 1.65;
            word-break: break-all;
            border-radius: 16px;
        }

        .bubble-l {
            background: var(--sub);
            border-top-left-radius: 4px;
            color: var(--text);
        }

        .bubble-r {
            background: var(--main);
            color: #fff;
            border-top-right-radius: 4px;
        }

        .bubble-img {
            padding: 6px;
            max-width: 220px;
            border-radius: 12px;
        }

        .bubble-img img {
            width: 100%;
            border-radius: 8px;
        }

        /* 节奏控制栏 */
        .speed-bar {
            display: flex;
            align-items: center;
            padding: 6px 16px;
            gap: 10px;
            background: #ffffff66;
        }

        .ctrl-group {
            display: flex;
            gap: 6px;
        }

        .ctrl-btn {
            padding: 4px 9px;
            border: none;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
        }

        .continue {
            background: #b2f2bb;
            color: #222;
        }

        .break {
            background: #ffc9c9;
            color: #222;
        }

        .speed-text {
            font-size: 12px;
            color: #666;
        }

        input[type="range"] {
            width: 120px;
        }

        /* 底部输入栏 */
        .input-bar {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            background: var(--card);
            border-top: 1px solid var(--border);
            gap: 8px;
        }

        #msg-input {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 9px 14px;
            outline: none;
            resize: none;
            height: 42px;
            background: #fff;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--btn);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }

        .icon-btn:hover {
            background: var(--hover);
        }

        /* 弹窗通用 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #00000045;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .modal-box {
            width: 92%;
            max-width: 480px;
            max-height: 82vh;
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            overflow-y: auto;
        }

        .modal-hd {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-weight: 600;
            color: var(--main);
        }

        .close {
            font-size: 20px;
            cursor: pointer;
            color: #999;
        }

        .set-row {
            margin: 14px 0;
        }

        .set-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
            display: block;
        }

        input, textarea, select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
            font-size: 13px;
        }

        /* 外观设置入口分栏 */
        .set-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .grid-btn {
            padding: 10px;
            border: 1px solid var(--main);
            background: #fff;
            color: var(--main);
            border-radius: 10px;
            cursor: pointer;
        }

        /* 表情&图片标签页 */
        .tab-hd {
            display: flex;
            border-bottom: 1px solid #eee;
            margin-bottom: 12px;
        }

        .tab-item {
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
        }

        .tab-active {
            border-bottom: 2px solid var(--main);
            color: var(--main);
            font-weight: 500;
        }

        .emoji-wrap {
            display: none;
            flex-wrap: wrap;
            gap: 6px;
        }

        .emoji-wrap.show {
            display: flex;
        }

        .emoji-item {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #eee;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
        }

        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 30px 10px;
            text-align: center;
            font-size: 13px;
            color: #888;
        }

        /* 高级功能模块卡片 */
        .func-card {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            margin: 12px 0;
        }

        .func-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--main);
            margin-bottom: 8px;
        }

        .func-text {
            font-size: 12px;
            color: #666;
            margin-top: 6px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="bg-blur" id="bgBlur"></div>
    <div class="main-wrap">
        <!-- 顶部导航 -->
        <div class="top-nav">
            <div class="nav-title">milk 聊天</div>
            <div class="nav-btn-group">
                <button class="nav-btn" onclick="openMainSet()">外观设置</button>
                <button class="nav-btn" onclick="openAdvance()">高级功能</button>
                <button class="nav-btn" onclick="openOriginSet()">原版设置</button>
            </div>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-container" id="chatBox"></div>

        <!-- 回复节奏控制栏 -->
        <div class="speed-bar">
            <div class="ctrl-group">
                <button class="ctrl-btn continue" onclick="continueTalk()">继续回复</button>
                <button class="ctrl-btn break" onclick="breakTalk()">打断回复</button>
            </div>
            <div class="speed-text">
                打字速度：
                <input type="range" id="speedRange" min="180" max="2200" value="550" oninput="changeSpeed()">
                <span id="speedTip">适中</span>
            </div>
        </div>

        <!-- 底部输入栏 -->
        <div class="input-bar">
            <textarea id="msg-input" placeholder="输入消息发送..." maxlength="600"></textarea>
            <button class="icon-btn" onclick="openEmoji()">😀</button>
            <button class="icon-btn" onclick="sendMessage()">➤</button
